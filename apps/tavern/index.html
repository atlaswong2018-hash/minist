<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: 留出刘海/底部安全区;padding 由 env(safe-area-inset-*) 处理 -->
  <!-- maximum-scale=1, user-scalable=no: 微信内置浏览器禁掉双指缩放,防误触放大 -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="theme-color" content="#1f1f2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="minist 酒馆" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>minist 酒馆</title>
  <style>
    /* 内联 loading 占位:在 Vue 挂载前给用户即时反馈,避免白屏 */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1f1f2e;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
    #app { height: 100%; }
    .tavern-boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1f1f2e;
      z-index: 9999;
    }
    .tavern-boot__spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: tavern-spin 0.8s linear infinite;
    }
    .tavern-boot__text {
      font-size: 14px;
      color: #a1a1aa;
      letter-spacing: 0.04em;
    }
    @keyframes tavern-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Vue 挂载前的 loading 占位,挂载后会被 App.vue 替换 -->
    <div class="tavern-boot">
      <div class="tavern-boot__spinner"></div>
      <div class="tavern-boot__text">minist 酒馆启动中…</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
