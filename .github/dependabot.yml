version: 2
updates:
  # npm 依赖(根 + 各 workspace)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies]
    groups:
      vue:
        patterns: ["vue", "@vue/*", "vue-tsc"]
      build:
        patterns: ["vite", "@vitejs/*", "typescript"]
      tencent:
        patterns: ["tencentcloud-*", "cos-nodejs-sdk-v5"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: [dependencies, ci]
