name: Deploy Demo to Pages

# 发布到 GitHub Pages,得到两个在线站点:
#   - 在线 demo(酒馆 tavern,可真实聊天,本地模式自带 API Key):https://<owner>.github.io/minist/
#   - 案例部署平台 platform(选 CF/腾讯、一键部署向导、AI 助手):https://<owner>.github.io/minist/platform/
#
# tavern 与 platform 都用 vite base './' (相对路径),故 platform 放子路径 /platform/ 资源也能正确加载。
#
# ⚠️ 一次性前提:仓库 Settings → Pages → Build and deployment → Source 必须选 "GitHub Actions"。
#    没启用时 deploy-pages 会失败、站点 404。

on:
  push:
    branches: [main]
    paths:
      - 'apps/tavern/**'
      - 'apps/platform/**'
      - 'packages/shared/**'
      - 'packages/core/**'
      - 'packages/deploy-agent/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build tavern (在线 demo,根路径)
        run: npm run build --workspace @minist/tavern

      - name: Build platform (案例部署站,/platform/)
        run: npm run build --workspace @minist/platform

      - name: Assemble site (tavern → 根,platform → /platform/)
        run: |
          set -e
          mkdir -p site/platform
          cp -a apps/tavern/dist/. site/
          cp -a apps/platform/dist/. site/platform/
          echo "minist GitHub Pages 站点" > site/about.txt
          echo "根 = tavern 在线 demo; /platform/ = 案例部署平台" >> site/about.txt
          find site -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
