name: Deploy Platform to Pages

# 把案例部署平台(apps/platform)构建并发布到 GitHub Pages,
# 得到在线"案例网站":https://atlaswong2018-hash.github.io/minist/
# 访客可在该网页选平台(CF/腾讯)、看向导、调 AI 部署助手。
#
# 一次性前提:仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"。

on:
  push:
    branches: [main]
    paths:
      - 'apps/platform/**'
      - 'packages/shared/**'
      - 'packages/deploy-agent/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个 Pages 部署,新的取消旧的。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build platform (案例部署平台)
        run: npm run build --workspace @minist/platform

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/platform/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
