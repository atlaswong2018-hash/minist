# minist 腾讯云 SCF 部署配置(Serverless Framework)
#
# 两种部署方式:
#   方式 A(推荐新手):sls deploy —— 用 Serverless Framework CLI 一键部署
#       前置:npm i -g serverless、已用腾讯云子账号 CAM 凭证 sls credentials 配置
#   方式 B(推荐熟手):打包 zip 手动上传
#       cd packages/scf-tencent && npm install --production
#       zip -r minist-scf.zip . -x "*.git*" "node_modules/.cache/*"
#       在 SCF 控制台「函数管理 → 创建函数 → 从本地上传 zip」
#
# 部署后必做(防爆产):控制台确认 超时60/内存128/并发1/关闭失败重试,
#   或部署成功后调用 POST /api/admin/set-timeout 自锁(方案二)。
#
# 文档:https://cloud.tencent.com/document/product/583/56124 (Web 函数)
#       https://github.com/serverless-components/tencent-scf

# 阿里云/腾讯云的 Serverless Components 顶层 component 固定为 scf
component: scf

# 部署组织名(在该腾讯云账号下唯一,冲突会报错;可改)
org: minist
app: minist-scf

inputs:
  name: minist-scf
  # SCF Web 函数:入口类型必须显式声明为 web
  src:
    src: ./
    # 指定启动文件;若仓库内已有 scf_bootstrap 可省略,组件会自动生成
    exclude:
      - .env
      - .env.local
      - node_modules/**    # 重新打 zip 时排除本地依赖,让平台按 package.json 装
      - "*.zip"
  runtime: Nodejs18.15
  # Web 函数:handler 固定 web 钩子,实际由 scf_bootstrap 接管
  handler: scf_bootstrap
  region: ${env:COS_REGION, 'ap-guangzhou'}
  description: minist 腾讯云 SCF 后端(OpenAI 兼容流式中转 + COS 同步备份)

  # 防爆产默认值
  memorySize: 128
  timeout: 60

  # 环境变量(敏感值用 ${env:XXX} 从本机环境读取,避免硬编码进仓库)
  environment:
    variables:
      ADMIN_TOKEN: ${env:ADMIN_TOKEN}
      COS_BUCKET: ${env:COS_BUCKET}
      COS_REGION: ${env:COS_REGION, 'ap-guangzhou'}
      LLM_PROXY_URL: ${env:LLM_PROXY_URL, 'https://api.deepseek.com'}

  # 事件触发器:HTTP 类型(生成 API 网关触发器,微信内默认被拦,需走免备案通道,见 README)
  events:
    - apigw:
        name: minist-api
        parameters:
          protocols:
            - http
            - https
          endpoints:
            - path: /
              method: ANY

  # 防扣费:最大并发实例数 = 1(个人低频使用,杜绝多实例同时计费)
  instanceConcurrency: 1
  # 异步执行关闭(流式必须同步返回,且避免空转)
  asyncRunEnable: false
